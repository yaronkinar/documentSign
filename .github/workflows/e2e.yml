name: E2E Tests

on:
  push:
  pull_request:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BYPASS_TOKEN: ci-bypass-token
  BYPASS_AUTH_EMAIL: test@example.com
  PLAYWRIGHT_BASE_URL: http://localhost:3000
  PLAYWRIGHT_API_URL: http://127.0.0.1:3001

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create CI env file
        run: node scripts/create-ci-env.mjs

      - name: Build and start Docker stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build --wait

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e:ci
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload Docker logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color

      - name: Stop Docker stack
        if: always()
        run: |
          test -f .env || node scripts/create-ci-env.mjs
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
