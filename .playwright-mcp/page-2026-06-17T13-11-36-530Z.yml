      - paragraph [ref=e13]: מסמך זה הוא הסכם הרחבה בין אגף רכש לחברת שירותים עירוניים בע"מ, המתייחס להכנסות משכירות חניון עירוני ולמימוש אופציה למכירת ציוד עירוני. ההסכם כולל התחייבויות לספק שירותי ניקיון ואחזקה למבני ציבור, עם תקופת ההסכם מ-1 בינואר 2024 ועד 31 בדצמבר 2024, והכנסות שנתיות של 45,000 ש"ח. יש לשים לב לכך שההרחבה כוללת את היקף השירות לשני מבנים נוספים, וכי קיימים ביטוחי אחריות מקצועית וצד ג'.
