# DocFlow API — Railway service config
# In Railway: New Project → Deploy from GitHub → add a service for "api"
# Settings → Config-as-code → set path to: /apps/api/railway.toml
# Root Directory: leave empty (repo root — required for npm workspaces)

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build:shared && npm run build:api"
watchPatterns = [
  "/apps/api/**",
  "/packages/shared/**",
  "/package.json",
  "/package-lock.json",
]

[deploy]
startCommand = "npm run start:prod -w api"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
